# LiveAnnounce Configuration v1.1.5 - ¡MINIMESSAGE SUPPORT!
# ========================================
# MESSAGE FORMAT
# ========================================
# This plugin supports:
# - MiniMessage (recommended)
# - Legacy colors (&)
#
# IMPORTANT:
# Do NOT mix both formats in the same line.
# ============================================
# PROXY CONFIGURATION - LiveAnnounce
# ============================================
proxy:
  # Enable or disable the proxy system completely
  # If set to false, will ONLY send to the local server
  enabled: false

  # Proxy type (options: "auto", "bungeecord", "velocity", "none")
  # - "auto": Automatically detects
  # - "bungeecord": Force BungeeCord
  # - "velocity": Force Velocity (Paper only)
  # - "none": No proxy, local only
  type: "auto"

  # Automatic detection (only applies if type: "auto")
  auto-detect: true

  # Velocity Config
  velocity-enabled: false  # Change to true ONLY if using Velocity AND Paper
  has-network: false      # Change to true ONLY if there is MORE THAN 1 server in the network

# ========== BASIC SETTINGS ==========
enabled: true
prefix: "&8[&bLiveAnnounce&8] &7"

# ========== CONFIGURABLE MESSAGES ==========
messages:
  # Error messages
  unknown-command: "&cInvalid subcommand. Use &b/la help"
  no-permission: "&cYou don't have permission to execute this command."
  invalid-link: "&cInvalid link.&r &fSupported platforms: Twitch, YouTube, Kick, TikTok"
  invalid-link-example: "&fExample: &b/directo https://twitch.tv/ccoding"
  player-only: "&cThis command can only be used by players."
  command-not-found: "&cCommand not found. Use /la help"

  # Success messages
  reloaded: "&aConfiguration reloaded successfully."
  enabled: "&aPlugin enabled."
  disabled: "&cPlugin disabled."

  # Status messages
  status-enabled: "&7Status: &aEnabled"
  status-disabled: "&7Status: &cDisabled"

# ========== PLATFORM COLORS CONFIGURATION ==========
platform-colors:
  twitch: "&d"      # Purple
  youtube: "&c"     # Red
  kick: "&a"        # Green
  tiktok: "&b"      # Aqua
  default: "&6"     # Gold

# ========== ANNOUNCEMENT FORMAT CONFIGURATION ==========
# Supports legacy colors (&) and MiniMessage (<gradient>, <rainbow>, <red>, etc.)
announcement-formats:
  default:
    line1: "<gradient:#555555:#aaaaaa><bold>--------------------------------------------------</bold></gradient>"
    title: "<yellow>⚡</yellow> <reset>{color}<bold>¡LIVE ON {platform_upper}!</bold> <yellow>⚡</yellow>"
    description: "<red>{player}</red> <reset>is now <rainbow>streaming live</rainbow>"
    link: "<white>Join now!</white> {color}&n{link}"
    hover: "<yellow>Click to open the <bold>stream</bold>!"
    line2: "<gradient:#555555:#aaaaaa><bold>--------------------------------------------------<bold></gradient>"

# ========== SOUNDS CONFIGURATION ==========
# Sound settings for announcements
sounds:
  # Enable/disable all sounds globally
  enabled: true
  # Play a sound to the command sender when successfully executed
  notify-sender: true

  # Sound played when a stream is announced (everyone hears it)
  announce:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.0

  # Success sound for the command executor
  success:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.5
    pitch: 1.5

# ========== DISCORD WEBHOOK CONFIGURATION ==========
discord:
  enabled: false
  webhook-url: "https://discord.com/api/webhooks/..."
  embed:
    color: 16711680 # Código decimal del color rojo (ej. 16711680)
    title: "⚡ ¡{player} está en directo en {platform}! ⚡"
    description: "¡Únete ahora haciendo click aquí!\n{link}"
